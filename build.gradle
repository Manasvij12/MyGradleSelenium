apply plugin: 'java'
apply plugin: 'application'

repositories {
    mavenCentral()
}

dependencies {
    compile 'com.google.guava:guava:23.0'
    compile 'org.seleniumhq.selenium:selenium-java:4.41.0'
    compile 'io.github.bonigarcia:webdrivermanager:5.8.0'
    testCompile 'junit:junit:4.12'
}

mainClassName = 'App'   // ⚠️ change if package exists

